<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>MyClipboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="搜索内容..." autofocus>
    </div>

    <div id="body-row">
      <div id="sidebar">
        <button class="sidebar-item active" data-filter="all" title="全部">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <button class="sidebar-item" data-filter="pinned" title="置顶">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="17" x2="12" y2="22"/>
            <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
          </svg>
        </button>
        <button class="sidebar-item" data-filter="images" title="图片">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
      </div>

      <div id="main-panel">
        <div id="entry-list">
        </div>

      </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-overlay" class="hidden">
      <div id="preview-modal">
        <div id="preview-header">
          <span>预览</span>
          <button id="preview-close">&times;</button>
        </div>
        <div id="preview-content">
        </div>
        <div id="preview-footer">
          <button id="preview-copy">复制</button>
          <button id="preview-delete">删除</button>
        </div>
      </div>
    </div>
  </div>

  <div id="copy-toast"></div>
  <script src="app.js"></script>
</body>
</html>
